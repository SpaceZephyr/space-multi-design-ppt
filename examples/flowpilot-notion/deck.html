em, system-ui, \"Segoe UI\", Helvetica, Arial, sans-serif;\n  }\n  .slide { width: 1280px; height: 720px; padding: 72px 96px; display: flex; gap: 64px; align-items: center; }\n  .left { width: 520px; flex-shrink: 0; }\n  .eyebrow { display: inline-block; background: #ffffff; color: #0075de; font-size: 12px; font-weight: 600; letter-spacing: 0.125px; border-radius: 9999px; padding: 5px 12px; border: 1px solid #e6e6e6; margin-bottom: 24px; }\n  h1 { font-size: 46px; font-weight: 700; line-height: 1.15; letter-spacing: -1.4px; }\n  .lead { margin-top: 24px; font-size: 18px; line-height: 1.7; color: #615d59; }\n  .lead strong { color: #31302e; font-weight: 600; }\n  .right { flex: 1; display: flex; flex-direction: column; gap: 16px; }\n  .card {\n    background: #ffffff; border: 1px solid #e6e6e6; border-radius: 12px; padding: 22px 24px;\n    display: flex; gap: 16px; align-items: flex-start;\n    box-shadow: rgba(0,0,0,0.01) 0 0.175px 1.041px, rgba(0,0,0,0.02) 0 0.8px 2.925px, rgba(0,0,0,0.027) 0 2.025px 7.847px, rgba(0,0,0,0.04) 0 4px 18px;\n  }\n  .dot { width: 12px; height: 12px; border-radius: 9999px; flex-shrink: 0; margin-top: 7px; }\n  .card h3 { font-size: 20px; font-weight: 600; line-height: 1.4; letter-spacing: -0.125px; }\n  .card p { margin-top: 6px; font-size: 15px; line-height: 1.55; color: #615d59; }\n</style>\n</head>\n<body>\n  <div class=\"slide\">\n    <div class=\"left\">\n      <div class=\"eyebrow\">为什么是现在</div>\n      <h1>小团队最贵的成本，是被流程吃掉的时间</h1>\n      <p class=\"lead\">10–50 人的团队没有专职 PMO：会议、分派、汇报这些\"胶水工作\"落在每个人头上，<strong>信息散落在 Slack、GitHub 和 Jira 里</strong>，拼起来靠人肉。</p>\n    </div>\n    <div class=\"right\">\n      <div class=\"card\">\n        <div class=\"dot\" style=\"background:#ff64c8;\"></div>\n        <div><h3>会议开完就忘</h3><p>纪要靠自觉，待办没人认领，下周同一件事再开一次会。</p></div>\n      </div>\n      <div class=\"card\">\n        <div class=\"dot\" style=\"background:#dd5b00;\"></div>\n        <div><h3>任务分派凭感觉</h3><p>谁闲谁上、谁吼谁上——负载和技能匹配全靠管理者脑内记账。</p></div>\n let cur = 0;
const frame = document.getElementById('slide-frame');
const ind = document.getElementById('page-ind');
const grid = document.getElementById('grid');
const hud = document.getElementById('hud');
let hudTimer;

function show(i, push=true) {
  cur = Math.max(0, Math.min(SLIDES.length-1, i));
  frame.srcdoc = SLIDES[cur];
  ind.textContent = (cur+1) + ' / ' + SLIDES.length;
  if (push) location.hash = '#' + (cur+1);
  document.querySelectorAll('.thumb').forEach((t,j)=>t.classList.toggle('current', j===cur));
  wakeHud();
}
function next(){ show(cur+1); } function prev(){ show(cur-1); }
function toggleFS(){ document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); }
function toggleGrid(){ grid.classList.toggle('open'); }
function fit(){
  const s = Math.min(innerWidth/1280, innerHeight/720) * (document.fullscreenElement ? 1 : 0.92);
  document.getElementById('frame-wrap').style.transform = 'scale(' + s + ')';
}
function wakeHud(){ hud.classList.remove('faded'); clearTimeout(hudTimer); hudTimer = setTimeout(()=>hud.classList.add('faded'), 2500); }
addEventListener('resize', fit);
addEventListener('mousemove', wakeHud);
addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' '||e.key==='PageDown') { e.preventDefault(); next(); }
  else if (e.key==='ArrowLeft'||e.key==='PageUp') { e.preventDefault(); prev(); }
  else if (e.key==='f'||e.key==='F') toggleFS();
  else if (e.key==='g'||e.key==='G') toggleGrid();
  else if (e.key==='Escape') grid.classList.remove('open');
  else if (e.key==='Home') show(0);
  else if (e.key==='End') show(SLIDES.length-1);
});
// grid thumbnails
SLIDES.forEach((s,i)=>{
  const d = document.createElement('div');
  d.className = 'thumb';
  const f = document.createElement('iframe');
  f.setAttribute('sandbox','allow-same-origin');
  f.srcdoc = s;
  const n = document.createElement('span');
  n.className = 'num'; n.textContent = i+1;
  d.appendChild(f); d.appendChild(n);
  d.onclick = ()=>{ grid.classList.remove('open'); show(i); };
  grid.appendChild(d);
});
const h = parseInt((location.hash||'').slice(1));
show(isNaN(h) ? 0 : h-1, false);
fit(); wakeHud();
