<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1280px; height:720px; overflow:hidden; }
  body { background:#faf9f5; color:#141413; font-family:'Inter','Noto Sans SC','PingFang SC',sans-serif; }
  .slide { width:1280px; height:720px; padding:64px 96px; display:flex; flex-direction:column; }
  .eyebrow { font-size:12px; font-weight:500; letter-spacing:1.5px; color:#cc785c; margin-bottom:16px; }
  h2 { font-family:'Cormorant Garamond','Noto Serif SC','Songti SC',serif; font-size:44px; font-weight:500; line-height:1.15; letter-spacing:-1px; }
  .cards { display:flex; gap:24px; margin-top:48px; flex:1; }
  .card {
    flex:1; background:#efe9de; border:1px solid #e6dfd8;
    border-radius:12px; padding:32px; display:flex; flex-direction:column;
  }
  .num { font-family:'Cormorant Garamond','Noto Serif SC',serif; font-size:44px; font-weight:500; color:#cc785c; letter-spacing:-1px; line-height:1; }
  .card h3 { font-family:'Cormorant Garamond','Noto Serif SC','Songti SC',serif; font-size:28px; font-weight:500; letter-spacing:-0.3px; margin:20px 0 12px; }
  .card p { font-size:16px; line-height:1.55; color:#3d3d3a; }
  .card .kpi { margin-top:auto; padding-top:20px; border-top:1px solid #e6dfd8; font-size:14px; font-weight:500; color:#6c6a64; line-height:1.55; }
  .kpi b { color:#141413; }
  .flow { margin-top:36px; text-align:center; font-size:15px; font-weight:500; color:#6c6a64; letter-spacing:0.5px; }
  .flow span { color:#cc785c; }
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow">方案 · 商业模型</div>
  <h2>小店 + 中央工厂 + 私域会员，一套已经跑通的轻模型</h2>
  <div class="cards">
    <div class="card">
      <div class="num">01</div>
      <h3>小店模型</h3>
      <p>30 平米、2 人运营的标准店型，租金与人力压到最低，快速可复制。</p>
      <div class="kpi">单店投入轻 · <b>回本周期短</b></div>
    </div>
    <div class="card">
      <div class="num">02</div>
      <h3>中央烘焙工厂</h3>
      <p>统一采购、统一烘焙、统一配送，从豆子端锁定风味，门店只做出品。</p>
      <div class="kpi">品质稳定的<b>底层保证</b></div>
    </div>
    <div class="card">
      <div class="num">03</div>
      <h3>小程序会员体系</h3>
      <p>下单、储值、社群全在私域小程序里，复购与用户资产握在自己手上。</p>
      <div class="kpi">会员复购率 <b>71%</b></div>
    </div>
  </div>
  <div class="flow">中央工厂控品质 <span>→</span> 小店控成本 <span>→</span> 会员控复购</div>
</div>
</body>
</html>
