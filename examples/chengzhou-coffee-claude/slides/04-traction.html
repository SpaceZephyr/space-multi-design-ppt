<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1280px; height:720px; overflow:hidden; }
  body {
    background:#181715; /* token: surface-dark — 数据页深色面板 */
    color:#faf9f5;      /* token: on-dark */
    font-family:'Inter','Noto Sans SC','PingFang SC',sans-serif;
  }
  .slide { width:1280px; height:720px; padding:64px 96px; display:flex; flex-direction:column; }
  .eyebrow { font-size:12px; font-weight:500; letter-spacing:1.5px; color:#cc785c; margin-bottom:16px; }
  h2 { font-family:'Cormorant Garamond','Noto Serif SC','Songti SC',serif; font-size:44px; font-weight:500; line-height:1.15; letter-spacing:-1px; color:#faf9f5; }
  .stats { display:flex; gap:24px; margin-top:56px; flex:1; }
  .stat {
    flex:1; background:#252320; /* token: surface-dark-elevated */
    border-radius:12px; padding:32px; display:flex; flex-direction:column; justify-content:center;
  }
  .stat .value { font-family:'Cormorant Garamond','Noto Serif SC',serif; font-size:88px; font-weight:500; letter-spacing:-1.5px; line-height:1.05; color:#cc785c; }
  .stat .value small { font-size:36px; letter-spacing:-0.5px; }
  .stat.amber .value { color:#e8a55a; } /* token: accent-amber */
  .stat.teal .value { color:#5db8a6; }  /* token: accent-teal */
  .stat .label { margin-top:16px; font-size:18px; font-weight:500; color:#faf9f5; }
  .stat .note { margin-top:6px; font-size:14px; line-height:1.55; color:#a09d96; /* token: on-dark-soft */ }
  .source { margin-top:32px; font-size:13px; font-weight:500; color:#a09d96; }
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow">数据 · 单店模型验证</div>
  <h2>12 家直营店，已经证明单店能赚钱</h2>
  <div class="stats">
    <div class="stat">
      <div class="value">18<small> 万元</small></div>
      <div class="label">单店月均营收</div>
      <div class="note">12 家直营店平均值，非样板店口径</div>
    </div>
    <div class="stat amber">
      <div class="value">62<small>%</small></div>
      <div class="label">毛利率</div>
      <div class="note">中央烘焙 + 统一供应链摊薄豆类与物料成本</div>
    </div>
    <div class="stat teal">
      <div class="value">71<small>%</small></div>
      <div class="label">会员复购率</div>
      <div class="note">小程序私域会员体系驱动，复购即利润</div>
    </div>
  </div>
  <div class="source">数据来源：橙洲咖啡 12 家直营店经营报表（截至本轮路演）</div>
</div>
</body>
</html>
