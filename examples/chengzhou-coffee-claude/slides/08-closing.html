<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1280px; height:720px; overflow:hidden; }
  body { background:#faf9f5; color:#141413; font-family:'Inter','Noto Sans SC','PingFang SC',sans-serif; padding:48px; }
  .callout {
    width:100%; height:100%;
    background:#cc785c; /* token: callout-card-coral / cta-band-coral */
    color:#ffffff;      /* token: on-primary */
    border-radius:12px; /* token: rounded.lg */
    padding:64px;       /* token: cta-band padding */
    display:flex; flex-direction:column;
  }
  .brand { display:flex; align-items:center; gap:12px; }
  .wordmark { font-family:'Cormorant Garamond','Noto Serif SC','Songti SC',serif; font-size:22px; font-weight:500; letter-spacing:-0.3px; }
  .center { flex:1; display:flex; flex-direction:column; justify-content:center; }
  h1 { font-family:'Cormorant Garamond','Noto Serif SC','Songti SC',serif; font-size:64px; font-weight:500; line-height:1.15; letter-spacing:-1.5px; max-width:900px; }
  .sub { margin-top:28px; font-size:19px; line-height:1.6; color:rgba(255,255,255,0.85); max-width:760px; }
  .footer { display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid rgba(255,255,255,0.3); padding-top:24px; font-size:14px; font-weight:500; }
  .footer .cta {
    background:#faf9f5; color:#141413; /* 反白按钮：coral 面上用 cream 按钮 */
    border-radius:8px; /* token: rounded.md */ padding:12px 20px; font-size:14px; font-weight:500;
  }
</style>
</head>
<body>
<div class="callout">
  <div class="brand">
    <svg width="24" height="24" viewBox="0 0 26 26" fill="none"><g stroke="#ffffff" stroke-width="3.4" stroke-linecap="round"><line x1="13" y1="2" x2="13" y2="24"/><line x1="2" y1="13" x2="24" y2="13"/><line x1="5" y1="5" x2="21" y2="21"/><line x1="21" y1="5" x2="5" y2="21"/></g></svg>
    <span class="wordmark">橙洲咖啡</span>
  </div>
  <div class="center">
    <h1>下一杯好咖啡，<br>在三线城市等你投出。</h1>
    <p class="sub">单店模型已验证、供应链已就位、50 城清单已排好——2000 万元，换一个区域精品咖啡连锁品牌的起点。</p>
  </div>
  <div class="footer">
    <span>天使轮 2000 万元 · 出让 15% · 12 家店经营数据与尽调材料随时开放</span>
    <span class="cta">会后约一场门店实地探访 →</span>
  </div>
</div>
</body>
</html>
