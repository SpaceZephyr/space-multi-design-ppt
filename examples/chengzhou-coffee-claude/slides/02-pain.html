<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1280px; height:720px; overflow:hidden; }
  body { background:#faf9f5; color:#141413; font-family:'Inter','Noto Sans SC','PingFang SC',sans-serif; }
  .slide { width:1280px; height:720px; padding:64px 96px; display:flex; flex-direction:column; }
  .eyebrow { font-size:12px; font-weight:500; letter-spacing:1.5px; color:#cc785c; margin-bottom:16px; }
  h2 { font-family:'Cormorant Garamond','Noto Serif SC','Songti SC',serif; font-size:44px; font-weight:500; line-height:1.15; letter-spacing:-1px; /* token: display-lg */ }
  .cards { display:flex; gap:24px; margin-top:44px; }
  .card {
    flex:1; background:#efe9de; /* token: surface-card */
    border:1px solid #e6dfd8;   /* token: hairline */
    border-radius:12px;         /* token: rounded.lg */
    padding:32px;               /* token: spacing.xl */
  }
  .card .tag { font-size:12px; font-weight:500; letter-spacing:1.5px; color:#6c6a64; }
  .card h3 { font-family:'Cormorant Garamond','Noto Serif SC','Songti SC',serif; font-size:28px; font-weight:500; letter-spacing:-0.3px; line-height:1.2; margin:14px 0 12px; /* token: display-sm */ }
  .card p { font-size:16px; line-height:1.55; color:#3d3d3a; }
  .callout {
    margin-top:40px; background:#cc785c; color:#ffffff; /* token: callout-card-coral */
    border-radius:12px; padding:26px 32px;
    font-family:'Cormorant Garamond','Noto Serif SC','Songti SC',serif;
    font-size:26px; letter-spacing:-0.3px; line-height:1.3;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow">痛点 · 为什么是现在</div>
  <h2>三线城市有咖啡需求，却没有像样的选择</h2>
  <div class="cards">
    <div class="card">
      <div class="tag">精品咖啡馆</div>
      <h3>供给不足</h3>
      <p>三线城市精品咖啡门店稀缺，想喝一杯认真做的咖啡，往往找不到店。</p>
    </div>
    <div class="card">
      <div class="tag">星巴克</div>
      <h3>价格太高</h3>
      <p>一杯三四十元的定价，超出三线城市日常消费的心理账户，只能偶尔喝。</p>
    </div>
    <div class="card">
      <div class="tag">瑞幸</div>
      <h3>品质不稳</h3>
      <p>够便宜、够方便，但出品波动大，满足不了对风味有要求的用户。</p>
    </div>
  </div>
  <div class="callout">✳ 空档正在这里：一杯喝得起、品质稳定的精品咖啡。</div>
</div>
</body>
</html>
